<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Pas de maximum-scale ni user-scalable=no : iOS Safari zoom auto sur input <16px,
         et ces restrictions empêchent l'ouvrier de dézoomer ensuite. On laisse le zoom libre. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080a0d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Profero Planning" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- Barlow Condensed : police utilisée partout dans l'UI. Sans ce chargement,
         les Android (pas d'Arial Narrow installé) tombent sur un fallback large
         qui casse la mise en page (chips qui débordent, titres sur 2 lignes…). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <title>Profero · Planning</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
